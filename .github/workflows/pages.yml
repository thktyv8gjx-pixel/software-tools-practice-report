name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Hexo Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Hexo theme dependencies
        run: |
          npm ls hexo-theme-landscape --depth=0
          npm ls hexo-renderer-stylus --depth=0

      - name: Adapt image paths for GitHub Pages
        run: python3 tools/fix-pages-paths.py

      - name: Build Hexo site
        run: |
          npx hexo clean
          npx hexo generate --config _config.yml,_config.github.yml

      - name: Verify generated site assets
        shell: bash
        run: |
          echo "Checking generated files..."
          test -s public/index.html
          test -s public/css/style.css

          echo "Landscape CSS:"
          ls -lh public/css/style.css

          echo "CSS reference in homepage:"
          grep -n "css/style.css" public/index.html

          echo "Files under public/css:"
          find public/css -maxdepth 2 -type f -print

          touch public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4